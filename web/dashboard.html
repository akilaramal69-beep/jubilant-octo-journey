<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Sniper Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px 30px;
            background: #12121a;
            border-radius: 12px;
            border: 1px solid #1e1e2e;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo h1 {
            font-size: 24px;
            font-weight: 600;
            color: #fff;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6c63ff, #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 2s infinite;
        }
        
        .status-dot.paused {
            background: #ff4466;
            box-shadow: 0 0 10px #ff4466;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .uptime {
            font-size: 14px;
            color: #888;
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #12121a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #1e1e2e;
            text-align: center;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #6c63ff;
        }
        
        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
            text-transform: uppercase;
        }
        
        .panel {
            background: #12121a;
            border-radius: 12px;
            border: 1px solid #1e1e2e;
            margin-bottom: 30px;
            overflow: hidden;
        }
        
        .panel-header {
            padding: 20px 25px;
            border-bottom: 1px solid #1e1e2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .panel-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }
        
        .panel-body {
            padding: 20px;
        }
        
        .scores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        
        .score-card {
            background: #0a0a0f;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #1e1e2e;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .score-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .symbol-name {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }
        
        .score-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
        }
        
        .score-badge.low {
            background: rgba(255, 68, 102, 0.2);
            color: #ff4466;
        }
        
        .score-badge.medium {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }
        
        .score-badge.high {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }
        
        .price {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
        }
        
        .signal {
            font-size: 14px;
            padding: 4px 10px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 10px;
        }
        
        .signal.strong-buy { background: #00ff88; color: #000; }
        .signal.buy { background: #4ade80; color: #000; }
        .signal.neutral { background: #ffc107; color: #000; }
        .signal.wait { background: #666; color: #fff; }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #888;
            margin-bottom: 5px;
        }
        
        .info-value {
            color: #e0e0e0;
        }
        
        .sentiment-bar {
            height: 6px;
            background: #1e1e2e;
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }
        
        .sentiment-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4466, #ffc107, #00ff88);
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        .positions-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .positions-table th,
        .positions-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #1e1e2e;
        }
        
        .positions-table th {
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            font-weight: 600;
        }
        
        .positions-table td {
            font-size: 14px;
        }
        
        .pnl-positive { color: #00ff88; }
        .pnl-negative { color: #ff4466; }
        
        .be-status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .be-status.active {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }
        
        .be-status.inactive {
            background: rgba(255, 68, 102, 0.2);
            color: #ff4466;
        }
        
        .log-container {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 12px 15px;
            border-bottom: 1px solid #1e1e2e;
            font-size: 13px;
            display: flex;
            gap: 15px;
            animation: fadeIn 0.3s ease;
        }
        
        .log-time {
            color: #888;
            white-space: nowrap;
        }
        
        .log-symbol {
            color: #6c63ff;
            font-weight: 600;
        }
        
        .log-message {
            color: #e0e0e0;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1e1e2e;
            border-top-color: #6c63ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .scores-grid {
                grid-template-columns: 1fr;
            }
            
            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .positions-table {
                font-size: 12px;
            }
            
            .positions-table th,
            .positions-table td {
                padding: 10px 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">🎯</div>
                <h1>Crypto Sniper Bot</h1>
            </div>
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Running</span>
                <span class="uptime" id="uptime">Uptime: --</span>
            </div>
        </header>
        
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="totalScans">0</div>
                <div class="stat-label">Total Scans</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="winRate">--</div>
                <div class="stat-label">Win Rate</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activePositions">0</div>
                <div class="stat-label">Active Positions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="circuitStatus">Normal</div>
                <div class="stat-label">Circuit Breaker</div>
            </div>
        </div>
        
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">📊 Live Scores</span>
                <span style="color: #888; font-size: 14px;">Auto-refresh: 15s</span>
            </div>
            <div class="panel-body">
                <div class="scores-grid" id="scoresGrid">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>
        </div>
        
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">📁 Open Positions</span>
            </div>
            <div class="panel-body">
                <table class="positions-table">
                    <thead>
                        <tr>
                            <th>Symbol</th>
                            <th>Entry</th>
                            <th>Current</th>
                            <th>PnL %</th>
                            <th>TP</th>
                            <th>SL</th>
                            <th>Time</th>
                            <th>BE</th>
                        </tr>
                    </thead>
                    <tbody id="positionsTable">
                        <tr><td colspan="8" class="empty-state">No open positions</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">🤖 AI Intelligence Feed</span>
            </div>
            <div class="panel-body">
                <div class="log-container" id="logContainer">
                    <div class="empty-state">Waiting for analysis data...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const SYMBOLS = ['BTC/USDT', 'ETH/USDT', 'SOL/USDT', 'BNB/USDT', 'DOGE/USDT'];
        
        function formatUptime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            return `${h}h ${m}m`;
        }
        
        function formatTime(isoString) {
            try {
                const date = new Date(isoString);
                return date.toLocaleTimeString();
            } catch {
                return '--:--:--';
            }
        }
        
        function getScoreClass(score) {
            if (score >= 7) return 'high';
            if (score >= 4) return 'medium';
            return 'low';
        }
        
        function getSignalClass(signal) {
            return signal.toLowerCase().replace(' ', '-');
        }
        
        async function fetchData() {
            try {
                const [statusRes, positionsRes, historyRes, scannerRes] = await Promise.all([
                    fetch('/api/status'),
                    fetch('/api/positions'),
                    fetch('/api/history'),
                    fetch('/api/scanner')
                ]);
                
                const status = await statusRes.json();
                const positions = await positionsRes.json();
                const history = await historyRes.json();
                const scanner = await scannerRes.json();
                
                // Update stats
                document.getElementById('totalScans').textContent = scanner.total_scans || 0;
                document.getElementById('activePositions').textContent = Object.keys(positions).length;
                document.getElementById('uptime').textContent = `Uptime: ${formatUptime(scanner.uptime_seconds || 0)}`;
                document.getElementById('circuitStatus').textContent = scanner.circuit_breaker_active ? 'Active' : 'Normal';
                
                // Update status indicator
                const statusDot = document.getElementById('statusDot');
                const statusText = document.getElementById('statusText');
                if (scanner.paused) {
                    statusDot.classList.add('paused');
                    statusText.textContent = 'Paused';
                } else {
                    statusDot.classList.remove('paused');
                    statusText.textContent = 'Running';
                }
                
                // Update scores grid
                renderScores(status);
                
                // Update positions
                renderPositions(positions);
                
                // Update log
                renderLogs(history);
                
            } catch (error) {
                console.error('Fetch error:', error);
            }
        }
        
        function renderScores(status) {
            const grid = document.getElementById('scoresGrid');
            
            if (!status || Object.keys(status).length <= 1) {
                grid.innerHTML = '<div class="empty-state">No analysis data yet. Scanner running...</div>';
                return;
            }
            
            let html = '';
            
            SYMBOLS.forEach(symbol => {
                const data = status[symbol];
                
                if (data) {
                    const score = data.score || 0;
                    const scoreClass = getScoreClass(score);
                    const signal = data.signal || 'WAIT';
                    const signalClass = getSignalClass(signal);
                    const sentiment = data.sentiment || 0.5;
                    
                    html += `
                        <div class="score-card">
                            <div class="score-header">
                                <span class="symbol-name">${symbol}</span>
                                <span class="score-badge ${scoreClass}">${score}/10</span>
                            </div>
                            <div class="price">$${data.price?.toFixed(4) || '0.0000'}</div>
                            <span class="signal ${signalClass}">${signal}</span>
                            <div class="info-row">
                                <span>Wave</span>
                                <span class="info-value">${data.elliott_phase || 'None'}</span>
                            </div>
                            <div class="info-row">
                                <span>BOS</span>
                                <span class="info-value">${data.bos ? 'Yes' : 'No'}</span>
                            </div>
                            <div class="info-row">
                                <span>Volume Spike</span>
                                <span class="info-value">${data.volume_spike ? 'Yes' : 'No'}</span>
                            </div>
                            <div class="info-row">
                                <span>Sentiment</span>
                                <span class="info-value">${sentiment.toFixed(2)}</span>
                            </div>
                            <div class="sentiment-bar">
                                <div class="sentiment-fill" style="width: ${sentiment * 100}%"></div>
                            </div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="score-card">
                            <div class="score-header">
                                <span class="symbol-name">${symbol}</span>
                                <span class="score-badge low">--</span>
                            </div>
                            <div class="price">--</div>
                            <span class="signal wait">PENDING</span>
                            <div class="info-row">
                                <span>Wave</span>
                                <span class="info-value">--</span>
                            </div>
                            <div class="info-row">
                                <span>Sentiment</span>
                                <span class="info-value">--</span>
                            </div>
                            <div class="sentiment-bar">
                                <div class="sentiment-fill" style="width: 50%"></div>
                            </div>
                        </div>
                    `;
                }
            });
            
            grid.innerHTML = html;
        }
        
        function renderPositions(positions) {
            const tbody = document.getElementById('positionsTable');
            
            if (!positions || Object.keys(positions).length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No open positions</td></tr>';
                return;
            }
            
            let html = '';
            
            for (const [symbol, pos] of Object.entries(positions)) {
                const entry = pos.entry_price || 0;
                const current = pos.current_price || entry;
                const pnl = ((current - entry) / entry * 100) || 0;
                const pnlClass = pnl >= 0 ? 'pnl-positive' : 'pnl-negative';
                const beStatus = pos.breakeven_moved ? 'active' : 'inactive';
                
                // Calculate time held
                let timeHeld = '--';
                try {
                    const opened = new Date(pos.opened_at);
                    const now = new Date();
                    const hours = (now - opened) / (1000 * 60 * 60);
                    timeHeld = hours.toFixed(1) + 'h';
                } catch {}
                
                html += `
                    <tr>
                        <td><strong>${symbol}</strong></td>
                        <td>$${entry.toFixed(4)}</td>
                        <td>$${current.toFixed(4)}</td>
                        <td class="${pnlClass}">${pnl.toFixed(2)}%</td>
                        <td>$${pos.tp_price?.toFixed(4) || '--'}</td>
                        <td>$${pos.sl_price?.toFixed(4) || '--'}</td>
                        <td>${timeHeld}</td>
                        <td><span class="be-status ${beStatus}">${beStatus === 'active' ? 'Yes' : 'No'}</span></td>
                    </tr>
                `;
            }
            
            tbody.innerHTML = html;
        }
        
        function renderLogs(history) {
            const container = document.getElementById('logContainer');
            
            if (!history || Object.keys(history).length === 0) {
                container.innerHTML = '<div class="empty-state">Waiting for analysis data...</div>';
                return;
            }
            
            let entries = [];
            
            for (const [symbol, entriesList] of Object.entries(history)) {
                if (entriesList && entriesList.length > 0) {
                    const latest = entriesList[entriesList.length - 1];
                    entries.push({
                        symbol,
                        ...latest
                    });
                }
            }
            
            // Sort by timestamp
            entries.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            // Take last 20
            entries = entries.slice(0, 20);
            
            if (entries.length === 0) {
                container.innerHTML = '<div class="empty-state">Waiting for analysis data...</div>';
                return;
            }
            
            let html = '';
            
            entries.forEach(entry => {
                const time = formatTime(entry.timestamp);
                const score = entry.score || 0;
                const signal = entry.signal || 'WAIT';
                
                html += `
                    <div class="log-entry">
                        <span class="log-time">${time}</span>
                        <span class="log-symbol">${entry.symbol}</span>
                        <span class="log-message">Score: ${score}/10 | Signal: ${signal}</span>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // Initial load
        fetchData();
        
        // Auto-refresh every 15 seconds
        setInterval(fetchData, 15000);
    </script>
</body>
</html>
