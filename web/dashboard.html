<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Sniper Bot</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 25px;
            background: #12121a;
            border-radius: 12px;
            border: 1px solid #1e1e2e;
        }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo h1 { font-size: 22px; font-weight: 600; color: #fff; }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #6c63ff, #8b5cf6);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .status-indicator { display: flex; align-items: center; gap: 10px; }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #00ff88; box-shadow: 0 0 8px #00ff88;
            animation: pulse 2s infinite;
        }
        .status-dot.paused { background: #ff4466; box-shadow: 0 0 8px #ff4466; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .stats-bar {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px;
        }
        .stat-card {
            background: #12121a; padding: 15px; border-radius: 10px;
            border: 1px solid #1e1e2e; text-align: center;
        }
        .stat-value { font-size: 24px; font-weight: 700; color: #6c63ff; }
        .stat-label { font-size: 11px; color: #888; margin-top: 4px; text-transform: uppercase; }
        
        .main-grid {
            display: grid; grid-template-columns: 300px 1fr; gap: 20px;
        }
        
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        
        .panel {
            background: #12121a; border-radius: 12px; border: 1px solid #1e1e2e; overflow: hidden;
        }
        .panel-header {
            padding: 15px 20px; border-bottom: 1px solid #1e1e2e;
            display: flex; justify-content: space-between; align-items: center;
        }
        .panel-title { font-size: 16px; font-weight: 600; color: #fff; }
        .panel-body { padding: 15px; }
        
        .symbol-list { display: flex; flex-direction: column; gap: 8px; }
        .symbol-btn {
            padding: 12px 15px; background: #0a0a0f; border: 1px solid #1e1e2e;
            border-radius: 8px; cursor: pointer; text-align: left;
            transition: all 0.2s;
        }
        .symbol-btn:hover { border-color: #6c63ff; }
        .symbol-btn.active { border-color: #6c63ff; background: #1a1a24; }
        .symbol-btn-name { font-weight: 600; color: #fff; font-size: 14px; }
        .symbol-btn-price { font-size: 13px; color: #888; margin-top: 4px; }
        .symbol-btn-score {
            float: right; padding: 2px 8px; border-radius: 10px;
            font-size: 12px; font-weight: 700;
        }
        .score-high { background: rgba(0,255,136,0.2); color: #00ff88; }
        .score-medium { background: rgba(255,193,7,0.2); color: #ffc107; }
        .score-low { background: rgba(255,68,102,0.2); color: #ff4466; }
        
        .chart-container { height: 400px; position: relative; }
        #chart { width: 100%; height: 100%; }
        
        .chart-controls {
            display: flex; gap: 10px; padding: 10px 15px;
            background: #0a0a0f; border-bottom: 1px solid #1e1e2e;
        }
        .timeframe-btn {
            padding: 6px 12px; background: #1e1e2e; border: none;
            border-radius: 6px; color: #888; cursor: pointer; font-size: 12px;
        }
        .timeframe-btn.active { background: #6c63ff; color: #fff; }
        
        .ai-panel { max-height: 350px; overflow-y: auto; }
        .ai-analysis {
            padding: 15px; background: #0a0a0f; border-radius: 8px; margin-bottom: 10px;
        }
        .ai-analysis-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px;
        }
        .ai-analysis-symbol { font-weight: 700; color: #6c63ff; }
        .ai-analysis-time { font-size: 11px; color: #666; }
        .ai-label { font-size: 12px; color: #666; margin-bottom: 4px; }
        .ai-value { font-size: 14px; color: #e0e0e0; }
        
        .pattern-badge {
            display: inline-block; padding: 3px 8px; background: #6c63ff;
            border-radius: 4px; font-size: 11px; margin-right: 5px; margin-bottom: 5px;
        }
        
        .prediction-row {
            display: flex; justify-content: space-between;
            padding: 8px 0; border-bottom: 1px solid #1e1e2e;
        }
        .prediction-label { color: #888; font-size: 12px; }
        .prediction-value { color: #fff; font-size: 12px; font-weight: 600; }
        
        .loading { text-align: center; padding: 40px; color: #666; }
        .spinner {
            width: 30px; height: 30px; border: 2px solid #1e1e2e;
            border-top-color: #6c63ff; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 1024px) {
            .main-grid { grid-template-columns: 1fr; }
            .chart-container { height: 300px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">🎯</div>
                <h1>Crypto Sniper Bot</h1>
            </div>
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Running</span>
                <span style="color: #666; font-size: 12px;"> | </span>
                <span id="uptime" style="color: #888; font-size: 12px;">Uptime: --</span>
            </div>
        </header>
        
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="totalScans">0</div>
                <div class="stat-label">Total Scans</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="winRate">--</div>
                <div class="stat-label">Win Rate</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activePositions">0</div>
                <div class="stat-label">Active Positions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="circuitStatus">Normal</div>
                <div class="stat-label">Circuit Breaker</div>
            </div>
        </div>
        
        <div class="main-grid">
            <div class="sidebar">
                <div class="panel">
                    <div class="panel-header">
                        <span class="panel-title">📊 Symbols</span>
                    </div>
                    <div class="panel-body">
                        <div class="symbol-list" id="symbolList"></div>
                    </div>
                </div>
                
                <div class="panel">
                    <div class="panel-header">
                        <span class="panel-title">🤖 AI Analysis</span>
                        <button onclick="runAIAnalysis()" style="padding: 4px 10px; background: #6c63ff; border: none; border-radius: 4px; color: #fff; cursor: pointer; font-size: 11px;">Analyze</button>
                    </div>
                    <div class="panel-body ai-panel" id="aiPanel">
                        <div class="loading">Select a symbol and click Analyze</div>
                    </div>
                </div>
            </div>
            
            <div class="panel">
                <div class="chart-controls">
                    <button class="timeframe-btn active" onclick="setTimeframe('1h', this)">1H</button>
                    <button class="timeframe-btn" onclick="setTimeframe('4h', this)">4H</button>
                    <button class="timeframe-btn" onclick="setTimeframe('1d', this)">1D</button>
                    <span style="margin-left: auto; color: #666; font-size: 12px; display: flex; align-items: center;">
                        Current: <strong id="currentSymbol" style="color: #6c63ff; margin-left: 5px;">BTC/USDT</strong>
                    </span>
                </div>
                <div class="chart-container">
                    <div id="chart"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const SYMBOLS = ['BTC/USDT', 'ETH/USDT', 'SOL/USDT', 'BNB/USDT', 'DOGE/USDT'];
        let currentSymbol = 'BTC/USDT';
        let chart, candleSeries, volumeSeries;
        let currentTimeframe = '1h';
        
        // Initialize chart
        function initChart() {
            chart = LightweightCharts.createChart(document.getElementById('chart'), {
                layout: { background: { color: '#0a0a0f' }, textColor: '#888' },
                grid: { vertLines: { color: '#1e1e2e' }, horzLines: { color: '#1e1e2e' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                rightPriceScale: { borderColor: '#1e1e2e' },
                timeScale: { borderColor: '#1e1e2e', timeVisible: true }
            });
            
            candleSeries = chart.addCandlestickSeries({
                upColor: '#00ff88', downColor: '#ff4466', borderUpColor: '#00ff88',
                borderDownColor: '#ff4466', wickUpColor: '#00ff88', wickDownColor: '#ff4466'
            });
            
            volumeSeries = chart.addHistogramSeries({
                color: '#6c63ff', priceFormat: { type: 'volume' }, priceScaleId: ''
            });
            volumeSeries.priceScale().applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });
            
            chart.resize();
            window.addEventListener('resize', () => chart.resize());
        }
        
        function setTimeframe(tf, btn) {
            document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTimeframe = tf;
            loadChartData();
        }
        
        async function loadChartData() {
            try {
                const res = await fetch(`/api/chart/${currentSymbol}`);
                const data = await res.json();
                
                if (data.candles && data.candles.length > 0) {
                    const candles = data.candles.map(c => ({
                        time: c.time, open: c.open, high: c.high, low: c.low, close: c.close
                    }));
                    const volumes = data.candles.map(c => ({
                        time: c.time, value: c.volume, color: c.close >= c.open ? 'rgba(0,255,136,0.3)' : 'rgba(255,68,102,0.3)'
                    }));
                    
                    candleSeries.setData(candles);
                    volumeSeries.setData(volumes);
                    chart.timeScale().fitContent();
                }
            } catch (e) {
                console.error('Chart load error:', e);
            }
        }
        
        async function runAIAnalysis() {
            const panel = document.getElementById('aiPanel');
            panel.innerHTML = '<div class="loading"><div class="spinner"></div>Analyzing...</div>';
            
            try {
                const res = await fetch(`/api/analyze/${currentSymbol}`);
                const data = await res.json();
                
                if (data.error) {
                    panel.innerHTML = '<div class="loading">' + data.error + '</div>';
                    return;
                }
                
                const patterns = data.patterns || {};
                const predictions = data.predictions || {};
                const ai = data.ai_analysis || {};
                
                let html = `
                    <div class="ai-analysis">
                        <div class="ai-analysis-header">
                            <span class="ai-analysis-symbol">${currentSymbol}</span>
                            <span class="ai-analysis-time">${new Date(data.timestamp).toLocaleString()}</span>
                        </div>
                        
                        <div class="ai-label">📈 Trend</div>
                        <div class="ai-value" style="color: ${patterns.trend === 'bullish' ? '#00ff88' : patterns.trend === 'bearish' ? '#ff4466' : '#ffc107'}">
                            ${patterns.trend?.toUpperCase() || 'N/A'}
                        </div>
                        
                        <div class="ai-label" style="margin-top: 12px;">🎯 Patterns</div>
                        <div>
                            ${patterns.patterns && patterns.patterns.length > 0 
                                ? patterns.patterns.map(p => `<span class="pattern-badge">${p.name}</span>`).join('')
                                : '<span style="color:#666;font-size:12px;">No patterns detected</span>'}
                        </div>
                        
                        <div class="ai-label" style="margin-top: 12px;">📊 Key Levels</div>
                        <div class="prediction-row">
                            <span class="prediction-label">Resistance</span>
                            <span class="prediction-value" style="color:#ff4466">${patterns.resistance_levels?.join(', ') || 'N/A'}</span>
                        </div>
                        <div class="prediction-row">
                            <span class="prediction-label">Support</span>
                            <span class="prediction-value" style="color:#00ff88">${patterns.support_levels?.join(', ') || 'N/A'}</span>
                        </div>
                        
                        <div class="ai-label" style="margin-top: 12px;">🔮 Predictions (Math)</div>
                        <div class="prediction-row">
                            <span class="prediction-label">Next 1</span>
                            <span class="prediction-value">$${predictions.predicted_prices?.[0] || 'N/A'}</span>
                        </div>
                        <div class="prediction-row">
                            <span class="prediction-label">Next 2</span>
                            <span class="prediction-value">$${predictions.predicted_prices?.[1] || 'N/A'}</span>
                        </div>
                        <div class="prediction-row">
                            <span class="prediction-label">ATR</span>
                            <span class="prediction-value">$${predictions.atr || 'N/A'}</span>
                        </div>
                        <div class="prediction-row">
                            <span class="prediction-label">Volatility</span>
                            <span class="prediction-value">${patterns.volatility || 0}%</span>
                        </div>
                    </div>
                `;
                
                if (ai.analysis) {
                    html += `
                        <div class="ai-analysis" style="border-left: 3px solid #6c63ff;">
                            <div class="ai-label" style="color:#6c63ff;font-weight:600;">🤖 AI Insight</div>
                            <div class="ai-value" style="margin-top:8px;">${ai.analysis}</div>
                            ${ai.key_levels ? `<div style="margin-top:8px;color:#888;font-size:12px;">Levels: ${ai.key_levels}</div>` : ''}
                            ${ai.recommendation ? `<div style="margin-top:8px;padding:8px;background:#1e1e2e;border-radius:4px;font-size:12px;">📋 ${ai.recommendation}</div>` : ''}
                            ${ai.risk_level ? `<div style="margin-top:8px;font-size:11px;">Risk: <span style="color:${ai.risk_level === 'low' ? '#00ff88' : ai.risk_level === 'high' ? '#ff4466' : '#ffc107'}">${ai.risk_level.toUpperCase()}</span></div>` : ''}
                        </div>
                    `;
                }
                
                panel.innerHTML = html;
            } catch (e) {
                panel.innerHTML = '<div class="loading">Analysis failed: ' + e.message + '</div>';
            }
        }
        
        async function loadSymbolList() {
            try {
                const res = await fetch('/api/status');
                const status = await res.json();
                
                let html = '';
                SYMBOLS.forEach(sym => {
                    const data = status[sym] || {};
                    const score = data.score || 0;
                    const price = data.price || 0;
                    const scoreClass = score >= 7 ? 'score-high' : score >= 4 ? 'score-medium' : 'score-low';
                    
                    html += `
                        <div class="symbol-btn ${sym === currentSymbol ? 'active' : ''}" onclick="selectSymbol('${sym}')">
                            <span class="symbol-btn-name">${sym}</span>
                            <span class="symbol-btn-score ${scoreClass}">${score}</span>
                            <div class="symbol-btn-price">$${price.toFixed(2)}</div>
                        </div>
                    `;
                });
                document.getElementById('symbolList').innerHTML = html;
            } catch (e) {
                console.error('Symbol list error:', e);
            }
        }
        
        function selectSymbol(sym) {
            currentSymbol = sym;
            document.getElementById('currentSymbol').textContent = sym;
            document.querySelectorAll('.symbol-btn').forEach(b => b.classList.remove('active'));
            event.target.closest('.symbol-btn').classList.add('active');
            loadChartData();
        }
        
        async function updateStats() {
            try {
                const [scannerRes, statsRes, posRes] = await Promise.all([
                    fetch('/api/scanner'),
                    fetch('/api/stats'),
                    fetch('/api/positions')
                ]);
                const scanner = await scannerRes.json();
                const stats = await statsRes.json();
                const positions = await posRes.json();
                
                document.getElementById('totalScans').textContent = scanner.total_scans || 0;
                document.getElementById('activePositions').textContent = Object.keys(positions).length || 0;
                document.getElementById('winRate').textContent = stats.win_rate ? stats.win_rate + '%' : '--';
                document.getElementById('circuitStatus').textContent = scanner.circuit_breaker_active ? 'Active' : 'Normal';
                
                const statusDot = document.getElementById('statusDot');
                document.getElementById('statusText').textContent = scanner.paused ? 'Paused' : 'Running';
                statusDot.classList.toggle('paused', scanner.paused);
                
                const h = Math.floor((scanner.uptime_seconds || 0) / 3600);
                const m = Math.floor((scanner.uptime_seconds || 0) % 3600 / 60);
                document.getElementById('uptime').textContent = `Uptime: ${h}h ${m}m`;
            } catch (e) {
                console.error('Stats error:', e);
            }
        }
        
        initChart();
        loadChartData();
        loadSymbolList();
        updateStats();
        
        setInterval(() => { loadSymbolList(); updateStats(); }, 15000);
        setInterval(loadChartData, 30000);
    </script>
</body>
</html>
