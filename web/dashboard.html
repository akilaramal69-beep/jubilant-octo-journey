<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Sniper Bot</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d0d12; color: #e0e0e0; min-height: 100vh; padding: 15px; }
        .container { max-width: 1600px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 12px 20px; background: #16161e; border-radius: 10px; border: 1px solid #2a2a3a; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo h1 { font-size: 18px; font-weight: 600; color: #fff; }
        .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .status-indicator { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #888; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
        .status-dot.paused { background: #ef4444; }
        
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 15px; }
        .stat-card { background: #16161e; padding: 12px; border-radius: 8px; border: 1px solid #2a2a3a; text-align: center; }
        .stat-value { font-size: 20px; font-weight: 700; color: #6366f1; }
        .stat-label { font-size: 10px; color: #666; margin-top: 4px; text-transform: uppercase; }
        
        .main-grid { display: grid; grid-template-columns: 260px 1fr; gap: 15px; }
        
        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .panel { background: #16161e; border-radius: 10px; border: 1px solid #2a2a3a; }
        .panel-header { padding: 12px 15px; border-bottom: 1px solid #2a2a3a; display: flex; justify-content: space-between; align-items: center; }
        .panel-title { font-size: 14px; font-weight: 600; }
        .panel-body { padding: 12px; }
        
        .symbol-list { display: flex; flex-direction: column; gap: 6px; }
        .symbol-btn { padding: 10px 12px; background: #0d0d12; border: 1px solid #2a2a3a; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
        .symbol-btn:hover { border-color: #6366f1; }
        .symbol-btn.active { border-color: #6366f1; background: #1e1e2e; }
        .symbol-btn-header { display: flex; justify-content: space-between; align-items: center; }
        .symbol-btn-name { font-weight: 600; font-size: 13px; }
        .symbol-btn-score { padding: 2px 6px; border-radius: 8px; font-size: 11px; font-weight: 700; }
        .score-high { background: rgba(34,197,94,0.2); color: #22c55e; }
        .score-medium { background: rgba(234,179,8,0.2); color: #eab308; }
        .score-low { background: rgba(239,68,68,0.2); color: #ef4444; }
        .symbol-btn-price { font-size: 11px; color: #666; margin-top: 4px; }
        
        .chart-panel { display: flex; flex-direction: column; }
        .chart-controls { display: flex; gap: 8px; padding: 10px 15px; background: #0d0d12; border-bottom: 1px solid #2a2a3a; }
        .timeframe-btn { padding: 5px 10px; background: #1e1e2e; border: none; border-radius: 4px; color: #888; cursor: pointer; font-size: 11px; }
        .timeframe-btn.active { background: #6366f1; color: #fff; }
        .timeframe-btn:hover { background: #2a2a3a; }
        .current-symbol { margin-left: auto; color: #666; font-size: 12px; }
        .current-symbol strong { color: #6366f1; margin-left: 5px; }
        
        .chart-container { height: 350px; position: relative; background: #0d0d12; }
        #chart { width: 100%; height: 100%; }
        .chart-error { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #666; font-size: 13px; }
        
        .analyze-btn { padding: 4px 10px; background: #6366f1; border: none; border-radius: 4px; color: #fff; cursor: pointer; font-size: 11px; }
        .analyze-btn:hover { background: #5558e3; }
        
        .ai-panel { max-height: 300px; overflow-y: auto; font-size: 12px; }
        .ai-empty { color: #666; text-align: center; padding: 30px; }
        .ai-loading { text-align: center; padding: 30px; color: #666; }
        .spinner { width: 20px; height: 20px; border: 2px solid #2a2a3a; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .ai-section { margin-bottom: 12px; padding: 10px; background: #0d0d12; border-radius: 6px; }
        .ai-label { font-size: 10px; color: #666; margin-bottom: 4px; text-transform: uppercase; }
        .ai-value { font-size: 13px; }
        .trend-bullish { color: #22c55e; }
        .trend-bearish { color: #ef4444; }
        .trend-neutral { color: #eab308; }
        
        .pattern-tags { display: flex; flex-wrap: wrap; gap: 4px; }
        .pattern-tag { padding: 2px 8px; background: rgba(99,102,241,0.2); color: #6366f1; border-radius: 4px; font-size: 10px; }
        
        .prediction-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #2a2a3a; }
        .prediction-row:last-child { border: none; }
        .pred-label { color: #666; }
        .pred-value { color: #e0e0e0; font-weight: 500; }
        
        .ai-insight { padding: 10px; background: #1e1e2e; border-radius: 6px; border-left: 3px solid #6366f1; margin-top: 10px; }
        .risk-low { color: #22c55e; }
        .risk-medium { color: #eab308; }
        .risk-high { color: #ef4444; }
        
        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
            .chart-container { height: 280px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo"><div class="logo-icon">🎯</div><h1>Crypto Sniper</h1></div>
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div><span id="statusText">Running</span>
                <span style="color:#444">|</span><span id="uptime">0h</span>
            </div>
        </header>
        
        <div class="stats-bar">
            <div class="stat-card"><div class="stat-value" id="totalScans">0</div><div class="stat-label">Scans</div></div>
            <div class="stat-card"><div class="stat-value" id="winRate">--</div><div class="stat-label">Win Rate</div></div>
            <div class="stat-card"><div class="stat-value" id="activePositions">0</div><div class="stat-label">Positions</div></div>
            <div class="stat-card"><div class="stat-value" id="circuitStatus">Normal</div><div class="stat-label">Circuit</div></div>
        </div>
        
        <div class="main-grid">
            <div class="sidebar">
                <div class="panel">
                    <div class="panel-header"><span class="panel-title">📊 Symbols</span></div>
                    <div class="panel-body"><div class="symbol-list" id="symbolList"></div></div>
                </div>
                <div class="panel">
                    <div class="panel-header">
                        <span class="panel-title">🤖 AI Analysis</span>
                        <button class="analyze-btn" onclick="runAIAnalysis()">Analyze</button>
                    </div>
                    <div class="panel-body ai-panel" id="aiPanel">
                        <div class="ai-empty">Click Analyze to get AI insights</div>
                    </div>
                </div>
            </div>
            
            <div class="panel chart-panel">
                <div class="chart-controls">
                    <button class="timeframe-btn active" onclick="setTimeframe('1h',this)">1H</button>
                    <button class="timeframe-btn" onclick="setTimeframe('4h',this)">4H</button>
                    <button class="timeframe-btn" onclick="setTimeframe('1d',this)">1D</button>
                    <span class="current-symbol">Viewing: <strong id="currentSymbol">BTC/USDT</strong></span>
                </div>
                <div class="chart-container">
                    <div id="chart"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const SYMBOLS = ['BTC/USDT','ETH/USDT','SOL/USDT','BNB/USDT','DOGE/USDT'];
        let currentSymbol = 'BTC/USDT';
        let chart = null, candleSeries = null, volumeSeries = null;
        let currentTimeframe = '1h';
        
        function initChart() {
            const container = document.getElementById('chart');
            if (!container) return;
            
            try {
                chart = LightweightCharts.createChart(container, {
                    width: container.clientWidth,
                    height: container.clientHeight,
                    layout: { background: { type: 'solid', color: '#0d0d12' }, textColor: '#666' },
                    grid: { vertLines: { color: '#1e1e2e' }, horzLines: { color: '#1e1e2e' } },
                    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                    rightPriceScale: { borderColor: '#2a2a3a' },
                    timeScale: { borderColor: '#2a2a3a', timeVisible: true }
                });
                
                candleSeries = chart.addCandlestickSeries({
                    upColor: '#22c55e', downColor: '#ef4444', borderUpColor: '#22c55e',
                    borderDownColor: '#ef4444', wickUpColor: '#22c55e', wickDownColor: '#ef4444'
                });
                
                volumeSeries = chart.addHistogramSeries({
                    color: '#6366f1', priceFormat: { type: 'volume' }, priceScaleId: ''
                });
                volumeSeries.priceScale().applyOptions({ scaleMargins: { top: 0.85, bottom: 0 } });
                
                window.addEventListener('resize', () => {
                    if (chart && container) chart.resize(container.clientWidth, container.clientHeight);
                });
            } catch(e) {
                console.error('Chart init error:', e);
            }
        }
        
        function setTimeframe(tf, btn) {
            document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTimeframe = tf;
            loadChartData();
        }
        
        async function loadChartData() {
            if (!candleSeries) initChart();
            if (!candleSeries) return;
            
            try {
                const res = await fetch(`/api/chart/${currentSymbol}`);
                const data = await res.json();
                
                if (data.error || !data.candles || data.candles.length === 0) {
                    document.getElementById('chart').innerHTML = '<div class="chart-error">No chart data. Scanner will populate on next scan.</div>';
                    return;
                }
                
                document.getElementById('chart').innerHTML = '';
                initChart();
                
                const candles = data.candles.map(c => ({
                    time: c.time, open: c.open, high: c.high, low: c.low, close: c.close
                }));
                const volumes = data.candles.map(c => ({
                    time: c.time, value: c.volume, 
                    color: c.close >= c.open ? 'rgba(34,197,94,0.4)' : 'rgba(239,68,68,0.4)'
                }));
                
                candleSeries.setData(candles);
                volumeSeries.setData(volumes);
                chart.timeScale().fitContent();
            } catch(e) {
                console.error('Chart load error:', e);
                document.getElementById('chart').innerHTML = '<div class="chart-error">Error loading chart</div>';
            }
        }
        
        async function runAIAnalysis() {
            const panel = document.getElementById('aiPanel');
            panel.innerHTML = '<div class="ai-loading"><div class="spinner"></div>Analyzing...</div>';
            
            try {
                const res = await fetch(`/api/analyze/${currentSymbol}`);
                const data = await res.json();
                
                if (data.error) {
                    panel.innerHTML = '<div class="ai-empty">' + data.error + '</div>';
                    return;
                }
                
                const p = data.patterns || {};
                const pred = data.predictions || {};
                const ai = data.ai_analysis || {};
                
                const trendClass = p.trend === 'bullish' ? 'trend-bullish' : p.trend === 'bearish' ? 'trend-bearish' : 'trend-neutral';
                
                let html = `<div class="ai-section">
                    <div class="ai-label">Trend</div>
                    <div class="ai-value ${trendClass}">${(p.trend || 'N/A').toUpperCase()}</div>
                    <div class="ai-label" style="margin-top:8px">Volatility</div>
                    <div class="ai-value">${p.volatility || 0}%</div>
                </div>`;
                
                if (p.patterns && p.patterns.length > 0) {
                    html += `<div class="ai-section">
                        <div class="ai-label">Patterns</div>
                        <div class="pattern-tags">${p.patterns.map(x => `<span class="pattern-tag">${x.name}</span>`).join('')}</div>
                    </div>`;
                }
                
                html += `<div class="ai-section">
                    <div class="ai-label">Key Levels</div>
                    <div class="prediction-row"><span class="pred-label">Resistance</span><span class="pred-value" style="color:#ef4444">${(p.resistance_levels||[]).join(', ') || 'N/A'}</span></div>
                    <div class="prediction-row"><span class="pred-label">Support</span><span class="pred-value" style="color:#22c55e">${(p.support_levels||[]).join(', ') || 'N/A'}</span></div>
                </div>`;
                
                html += `<div class="ai-section">
                    <div class="ai-label">Predictions</div>
                    <div class="prediction-row"><span class="pred-label">Next 1</span><span class="pred-value">$${pred.predicted_prices?.[0] || 'N/A'}</span></div>
                    <div class="prediction-row"><span class="pred-label">Next 2</span><span class="pred-value">$${pred.predicted_prices?.[1] || 'N/A'}</span></div>
                    <div class="prediction-row"><span class="pred-label">ATR</span><span class="pred-value">$${pred.atr || 'N/A'}</span></div>
                </div>`;
                
                if (ai.analysis) {
                    const riskClass = ai.risk_level === 'low' ? 'risk-low' : ai.risk_level === 'high' ? 'risk-high' : 'risk-medium';
                    html += `<div class="ai-section">
                        <div class="ai-label" style="color:#6366f1">AI Insight</div>
                        <div class="ai-value">${ai.analysis}</div>
                        ${ai.recommendation ? `<div style="margin-top:8px;padding:8px;background:#1e1e2e;border-radius:4px;font-size:11px">📋 ${ai.recommendation}</div>` : ''}
                        ${ai.risk_level ? `<div style="margin-top:8px;font-size:11px">Risk: <span class="${riskClass}">${ai.risk_level.toUpperCase()}</span></div>` : ''}
                    </div>`;
                }
                
                panel.innerHTML = html;
            } catch(e) {
                panel.innerHTML = '<div class="ai-empty">Analysis failed: ' + e.message + '</div>';
            }
        }
        
        function selectSymbol(sym) {
            currentSymbol = sym;
            document.getElementById('currentSymbol').textContent = sym;
            document.querySelectorAll('.symbol-btn').forEach(b => b.classList.remove('active'));
            event.target.closest('.symbol-btn').classList.add('active');
            loadChartData();
        }
        
        async function loadSymbolList() {
            try {
                const res = await fetch('/api/status');
                const status = await res.json();
                let html = '';
                SYMBOLS.forEach(s => {
                    const d = status[s] || {};
                    const sc = d.score || 0;
                    const scClass = sc >= 7 ? 'score-high' : sc >= 4 ? 'score-medium' : 'score-low';
                    html += `<div class="symbol-btn ${s===currentSymbol?'active':''}" onclick="selectSymbol('${s}')">
                        <div class="symbol-btn-header">
                            <span class="symbol-btn-name">${s}</span>
                            <span class="symbol-btn-score ${scClass}">${sc}</span>
                        </div>
                        <div class="symbol-btn-price">$${(d.price||0).toFixed(2)}</div>
                    </div>`;
                });
                document.getElementById('symbolList').innerHTML = html;
            } catch(e) { console.error(e); }
        }
        
        async function updateStats() {
            try {
                const [sc, st, pos] = await Promise.all([fetch('/api/scanner'), fetch('/api/stats'), fetch('/api/positions')]);
                const scanner = await sc.json();
                const stats = await st.json();
                const positions = await pos.json();
                
                document.getElementById('totalScans').textContent = scanner.total_scans || 0;
                document.getElementById('activePositions').textContent = Object.keys(positions).length || 0;
                document.getElementById('winRate').textContent = stats.win_rate ? stats.win_rate + '%' : '--';
                document.getElementById('circuitStatus').textContent = scanner.circuit_breaker_active ? 'Active' : 'Normal';
                
                const dot = document.getElementById('statusDot');
                document.getElementById('statusText').textContent = scanner.paused ? 'Paused' : 'Running';
                dot.classList.toggle('paused', scanner.paused);
                
                const h = Math.floor((scanner.uptime_seconds || 0) / 3600);
                const m = Math.floor((scanner.uptime_seconds || 0) % 3600 / 60);
                document.getElementById('uptime').textContent = `${h}h ${m}m`;
            } catch(e) { console.error(e); }
        }
        
        initChart();
        loadChartData();
        loadSymbolList();
        updateStats();
        
        setInterval(() => { loadSymbolList(); updateStats(); }, 20000);
        setInterval(loadChartData, 60000);
    </script>
</body>
</html>
